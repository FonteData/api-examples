openapi: 3.1.0
info:
  title: FonteData API
  version: "1.0"
  description: |
    Brazilian data intelligence REST API aggregating 108+ public and private data sources.
    CNPJ, CPF, KYC, compliance, judicial records and international sanctions.
    Pre-paid credits — no subscription, no minimum commitment.
    Free account: R$50 in credits at signup, no credit card required.
  contact:
    name: FonteData Support
    url: https://wa.me/5511991220174
    email: contato@fontedata.com
  license:
    name: Commercial
    url: https://fontedata.com/terms
  x-logo:
    url: https://fontedata.com/logo.svg

externalDocs:
  description: Full API documentation
  url: https://fontedata.com/docs

servers:
  - url: https://app.fontedata.com/api/v1
    description: Production

security:
  - ApiKeyAuth: []

tags:
  - name: Ambiental
  - name: Antifraude
  - name: Banco Central
  - name: Beneficios Sociais
  - name: Certidoes
  - name: Comercial
  - name: Compliance
  - name: Credito
  - name: Eleitoral
  - name: Fiscal
  - name: Internacional
  - name: Pessoa Fisica
  - name: Pessoa Juridica
  - name: Processos Judiciais
  - name: Receita Federal
  - name: Rural
  - name: Sancoes Internacionais
  - name: Trabalho
  - name: Tribunais
  - name: Veicular

components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key
      description: API key from https://app.fontedata.com

  headers:
    X-Request-Cost:
      description: Cost deducted in BRL
      schema: {type: string, example: "0.54"}
    X-Balance-Remaining:
      description: Remaining credit balance in BRL
      schema: {type: string, example: "47.23"}
    X-Request-Id:
      description: Unique request ID for debugging
      schema: {type: string}
    X-RateLimit-Remaining-RPM:
      description: Remaining requests per minute
      schema: {type: integer}

  responses:
    Unauthorized:
      description: Invalid or missing API key
      content:
        application/json:
          schema:
            type: object
            properties:
              error: {type: string, example: "invalid_api_key"}
    InsufficientBalance:
      description: Insufficient credit balance
      content:
        application/json:
          schema:
            type: object
            properties:
              error: {type: string, example: "insufficient_balance"}
    NotFound:
      description: Resource not found
    RateLimited:
      description: Rate limit exceeded

  schemas:
    ConsultaResponse:
      type: object
      description: >
        Response varies by endpoint. See https://fontedata.com/docs for
        endpoint-specific schemas.
      properties:
        cached:
          type: boolean
          description: Whether served from cache

paths:

  /consulta/ibama-debitos/{documento}:
    get:
      tags: [Ambiental]
      summary: Certidão de débitos ambientais do IBAMA
      operationId: ibamaDebitos
      parameters:
        - name: documento
          in: path
          required: true
          description: CPF (11 digits) or CNPJ (14 digits)
          schema: {type: string, example: "12345678900"}
      responses:
        "200":
          description: Certidão de débitos ambientais do IBAMA
          headers:
            X-Request-Cost:
              $ref: '#/components/headers/X-Request-Cost'
            X-Balance-Remaining:
              $ref: '#/components/headers/X-Balance-Remaining'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConsultaResponse'
        "401": {$ref: '#/components/responses/Unauthorized'}
        "402": {$ref: '#/components/responses/InsufficientBalance'}
        "429": {$ref: '#/components/responses/RateLimited'}
      x-cost: "R$ 0.54"
